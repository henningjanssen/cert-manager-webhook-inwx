name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Build and push PR preview artifacts
    runs-on: ubuntu-latest
    # Skip for fork PRs — GITHUB_TOKEN has no write access to packages on forks.
    if: github.event.pull_request.head.repo.full_name == github.repository
    env:
      PR_TAG: pr-${{ github.event.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=pr-${{ github.event.number }}
            type=raw,value=pr-${{ github.event.number }}-${{ github.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Set PR chart version
        id: version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "version=0.0.0-pr${{ github.event.number }}+${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "chart_name=cert-manager-webhook-inwx-0.0.0-pr${{ github.event.number }}+${SHORT_SHA}.tgz" >> "$GITHUB_OUTPUT"

      - name: Package Helm chart
        run: |
          helm package chart/ \
            --version "${{ steps.version.outputs.version }}" \
            --app-version "pr-${{ github.event.number }}-${{ github.sha }}"

      - name: Log in to GitHub Container Registry (OCI Helm)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io \
              --username "${{ github.actor }}" \
              --password-stdin

      - name: Push Helm chart to OCI registry
        run: |
          helm push \
            "${{ steps.version.outputs.chart_name }}" \
            "oci://ghcr.io/${{ github.repository_owner }}/charts"

      - name: Post artifact summary
        run: |
          echo "### PR Preview Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Docker image**" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "ghcr.io/${{ github.repository }}:pr-${{ github.event.number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "ghcr.io/${{ github.repository }}:pr-${{ github.event.number }}-${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Helm chart (OCI)**" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "oci://ghcr.io/${{ github.repository_owner }}/charts/cert-manager-webhook-inwx:${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Artifacts will be automatically deleted when this PR is merged or closed." >> "$GITHUB_STEP_SUMMARY"
