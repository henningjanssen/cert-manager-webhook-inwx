{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cert-manager-webhook-inwx.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cert-manager-webhook-inwx.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cert-manager-webhook-inwx.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress on the webhook HTTPS port from any source (cert-manager must reach it).
    - ports:
        - port: 8443
          protocol: TCP
    # Allow ingress on the metrics/health port (kubelet probes + Prometheus).
    - ports:
        - port: 8080
          protocol: TCP
  egress:
    # Allow egress to kube-dns for DNS resolution (UDP and TCP on port 53).
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow egress to external HTTPS endpoints (e.g. INWX API).
    - ports:
        - port: 443
          protocol: TCP
{{- end }}
